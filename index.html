<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arithmetic Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 6px;
    }

    input[type="number"] {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1.1rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input[type="number"]:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.25);
    }

    /* hide browser spin buttons */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }
    input[type="number"] { -moz-appearance: textfield; }

    .ops-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .op-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #ddd;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      user-select: none;
    }

    .op-btn .symbol {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .op-btn:hover {
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
    }

    .op-btn:active {
      transform: translateY(0);
    }

    .op-btn.add    { --accent: #4caf82; }
    .op-btn.sub    { --accent: #e94560; }
    .op-btn.mul    { --accent: #f4a832; }
    .op-btn.div    { --accent: #56b4f7; }

    .op-btn.add:hover    { border-color: #4caf82; color: #4caf82; }
    .op-btn.sub:hover    { border-color: #e94560; color: #e94560; }
    .op-btn.mul:hover    { border-color: #f4a832; color: #f4a832; }
    .op-btn.div:hover    { border-color: #56b4f7; color: #56b4f7; }

    .result-box {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 18px 20px;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-expression {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.45);
      min-height: 18px;
    }

    .result-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      word-break: break-all;
      min-height: 40px;
    }

    .result-value.error {
      font-size: 1.1rem;
      color: #e94560;
      font-weight: 500;
    }

    .clear-btn {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    @media (max-width: 480px) {
      .card { padding: 30px 20px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧮 Arithmetic Calculator</h1>
    <p class="subtitle">Enter two numbers and choose an operation</p>

    <div class="input-row">
      <div class="input-group">
        <label for="num1">Number 1</label>
        <input type="number" id="num1" placeholder="0" />
      </div>
      <div class="input-group">
        <label for="num2">Number 2</label>
        <input type="number" id="num2" placeholder="0" />
      </div>
    </div>

    <div class="ops-grid">
      <button class="op-btn add" onclick="calculate('add')">
        <span class="symbol">+</span>
        Addition
      </button>
      <button class="op-btn sub" onclick="calculate('sub')">
        <span class="symbol">−</span>
        Subtraction
      </button>
      <button class="op-btn mul" onclick="calculate('mul')">
        <span class="symbol">×</span>
        Multiplication
      </button>
      <button class="op-btn div" onclick="calculate('div')">
        <span class="symbol">÷</span>
        Division
      </button>
    </div>

    <div class="result-box">
      <div class="result-expression" id="expression"></div>
      <div class="result-value" id="result">—</div>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <script>
    let lastOp = null;

    function getNumbers() {
      const a = parseFloat(document.getElementById('num1').value);
      const b = parseFloat(document.getElementById('num2').value);
      return { a, b };
    }

    function showResult(expression, value, isError = false) {
      document.getElementById('expression').textContent = expression;
      const el = document.getElementById('result');
      el.textContent = value;
      el.className = 'result-value' + (isError ? ' error' : '');
    }

    function formatNum(n) {
      // Avoid scientific notation: use up to 10 decimal places and strip trailing zeros
      if (!isFinite(n)) return String(n);
      const fixed = n.toFixed(10);
      return parseFloat(fixed).toString();
    }

    function calculate(op) {
      lastOp = op;
      const { a, b } = getNumbers();

      if (isNaN(a) || isNaN(b)) {
        showResult('', 'Please enter both numbers.', true);
        return;
      }

      const symbols = { add: '+', sub: '−', mul: '×', div: '÷' };
      const sym = symbols[op];

      switch (op) {
        case 'add':
          showResult(`${a} ${sym} ${b} =`, formatNum(a + b));
          break;
        case 'sub':
          showResult(`${a} ${sym} ${b} =`, formatNum(a - b));
          break;
        case 'mul':
          showResult(`${a} ${sym} ${b} =`, formatNum(a * b));
          break;
        case 'div':
          if (b === 0) {
            showResult(`${a} ${sym} ${b} =`, 'Cannot divide by zero.', true);
          } else {
            showResult(`${a} ${sym} ${b} =`, formatNum(a / b));
          }
          break;
      }
    }

    function clearAll() {
      lastOp = null;
      document.getElementById('num1').value = '';
      document.getElementById('num2').value = '';
      document.getElementById('expression').textContent = '';
      document.getElementById('result').textContent = '—';
      document.getElementById('result').className = 'result-value';
    }

    // Allow Enter key on inputs to trigger the last-used operation (none by default)
    document.querySelectorAll('input[type="number"]').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') calculate(lastOp || 'add');
      });
    });
  </script>
</body>
</html>
