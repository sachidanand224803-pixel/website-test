<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathPop — Arithmetic Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --add: #FF6B6B;
    --sub: #4ECDC4;
    --mul: #FFE66D;
    --div: #A29BFE;
    --bg: #0F0E17;
    --card: #1A1A2E;
    --text: #FFFFFE;
    --muted: #a8a8b3;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background blobs */
  .bg-blobs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: float 10s ease-in-out infinite;
  }
  .blob1 { width: 500px; height: 500px; background: var(--add); top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 400px; height: 400px; background: var(--sub); bottom: -100px; right: -80px; animation-delay: -3s; }
  .blob3 { width: 300px; height: 300px; background: var(--mul); top: 40%; left: 50%; animation-delay: -6s; }
  .blob4 { width: 250px; height: 250px; background: var(--div); top: 10%; right: 20%; animation-delay: -1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-40px) scale(1.05); }
  }

  /* Header */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 48px 24px 20px;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--add), var(--mul), var(--sub), var(--div));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    background-size: 300% 300%;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .subtitle {
    color: var(--muted);
    font-size: 1.1rem;
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Operation tabs */
  .tabs {
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 24px 16px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    opacity: 0.55;
    background: var(--card);
    color: var(--text);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }
  .tab-btn::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tab-btn.add::before { background: linear-gradient(135deg, var(--add), #ff8e53); }
  .tab-btn.sub::before { background: linear-gradient(135deg, var(--sub), #2bcbbf); }
  .tab-btn.mul::before { background: linear-gradient(135deg, var(--mul), #f9c74f); }
  .tab-btn.div::before { background: linear-gradient(135deg, var(--div), #6c63ff); }

  .tab-btn span { position: relative; z-index: 1; }

  .tab-btn:hover { transform: translateY(-2px); opacity: 0.8; }
  .tab-btn.active {
    opacity: 1;
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .tab-btn.active::before { opacity: 1; }

  /* Main calculator area */
  .main {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 36px auto 0;
    padding: 0 20px 60px;
  }

  .calc-card {
    background: var(--card);
    border-radius: 28px;
    padding: 36px 32px;
    border: 1.5px solid rgba(255,255,255,0.06);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .op-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 6px 18px;
    border-radius: 50px;
    margin-bottom: 28px;
    transition: background 0.4s;
  }
  .op-badge.add { background: linear-gradient(135deg, var(--add), #ff8e53); }
  .op-badge.sub { background: linear-gradient(135deg, var(--sub), #2bcbbf); }
  .op-badge.mul { background: linear-gradient(135deg, var(--mul), #f9c74f); color: #333; }
  .op-badge.div { background: linear-gradient(135deg, var(--div), #6c63ff); }

  .inputs-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .num-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    width: 0; /* flex handles width */
    min-width: 0;
  }
  .num-input:focus {
    border-color: rgba(255,255,255,0.35);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
  }
  /* Remove arrows */
  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .num-input[type=number] { -moz-appearance: textfield; }

  .op-symbol {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    flex-shrink: 0;
    transition: color 0.3s;
    text-shadow: 0 0 20px currentColor;
  }
  .op-symbol.add { color: var(--add); }
  .op-symbol.sub { color: var(--sub); }
  .op-symbol.mul { color: var(--mul); }
  .op-symbol.div { color: var(--div); }

  /* Calculate button */
  .calc-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--text);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  .calc-btn::before {
    content: '';
    position: absolute; inset: 0;
    transition: opacity 0.3s;
  }
  .calc-btn.add::before { background: linear-gradient(135deg, var(--add), #ff8e53); }
  .calc-btn.sub::before { background: linear-gradient(135deg, var(--sub), #2bcbbf); }
  .calc-btn.mul::before { background: linear-gradient(135deg, var(--mul), #f9c74f); }
  .calc-btn.div::before { background: linear-gradient(135deg, var(--div), #6c63ff); }
  .calc-btn.mul { color: #222; }
  .calc-btn span { position: relative; z-index: 1; }
  .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
  .calc-btn:active { transform: scale(0.97); }

  /* Result box */
  .result-box {
    margin-top: 24px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.08);
    min-height: 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .result-label {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .result-value {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    line-height: 1;
    transition: color 0.3s;
    animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-value.add { color: var(--add); text-shadow: 0 0 30px rgba(255,107,107,0.5); }
  .result-value.sub { color: var(--sub); text-shadow: 0 0 30px rgba(78,205,196,0.5); }
  .result-value.mul { color: var(--mul); text-shadow: 0 0 30px rgba(255,230,109,0.5); }
  .result-value.div { color: var(--div); text-shadow: 0 0 30px rgba(162,155,254,0.5); }
  .result-value.error { color: var(--add); font-size: 1.3rem; }

  .result-equation {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 600;
  }

  /* History section */
  .history-section {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .history-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 16px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.12);
    color: var(--muted);
    border-radius: 50px;
    padding: 4px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: border-color 0.2s, color 0.2s;
  }
  .clear-btn:hover { border-color: var(--add); color: var(--add); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .history-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-left: 4px solid transparent;
    animation: slideIn 0.3s ease;
    font-weight: 700;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .history-item.add { border-left-color: var(--add); }
  .history-item.sub { border-left-color: var(--sub); }
  .history-item.mul { border-left-color: var(--mul); }
  .history-item.div { border-left-color: var(--div); }
  .history-item .eq { color: var(--muted); font-size: 0.9rem; }
  .history-item .ans {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
  }
  .history-item.add .ans { color: var(--add); }
  .history-item.sub .ans { color: var(--sub); }
  .history-item.mul .ans { color: var(--mul); }
  .history-item.div .ans { color: var(--div); }

  .empty-history {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 20px 0;
  }

  /* Confetti particles */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Background blobs -->
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<header>
  <div class="logo">MathPop 🎉</div>
  <div class="subtitle">Arithmetic made delightful</div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn add active" onclick="setOp('add')">
    <span>➕ Addition</span>
  </button>
  <button class="tab-btn sub" onclick="setOp('sub')">
    <span>➖ Subtraction</span>
  </button>
  <button class="tab-btn mul" onclick="setOp('mul')">
    <span>✖️ Multiply</span>
  </button>
  <button class="tab-btn div" onclick="setOp('div')">
    <span>➗ Division</span>
  </button>
</div>

<!-- Main Card -->
<div class="main">
  <div class="calc-card">
    <div class="op-badge add" id="opBadge">➕ Addition</div>

    <div class="inputs-row">
      <input class="num-input" id="numA" type="number" placeholder="0" />
      <div class="op-symbol add" id="opSymbol">+</div>
      <input class="num-input" id="numB" type="number" placeholder="0" />
    </div>

    <button class="calc-btn add" id="calcBtn" onclick="calculate()">
      <span>= Calculate</span>
    </button>

    <div class="result-box" id="resultBox">
      <div class="result-label">Result</div>
      <div class="result-value add" id="resultValue">—</div>
      <div class="result-equation" id="resultEquation"></div>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-section">
  <div class="history-title">
    <span>📋 History</span>
    <button class="clear-btn" onclick="clearHistory()">Clear all</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="empty-history">No calculations yet. Let's do some math! 🚀</div>
  </div>
</div>

<script>
  let currentOp = 'add';
  const history = [];

  const opConfig = {
    add: { symbol: '+', label: '➕ Addition',  emoji: '➕' },
    sub: { symbol: '−', label: '➖ Subtraction', emoji: '➖' },
    mul: { symbol: '×', label: '✖️ Multiply',   emoji: '✖️' },
    div: { symbol: '÷', label: '➗ Division',    emoji: '➗' },
  };

  function setOp(op) {
    currentOp = op;
    const cfg = opConfig[op];

    // Update tabs
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn.${op}`).classList.add('active');

    // Update badge
    const badge = document.getElementById('opBadge');
    badge.className = `op-badge ${op}`;
    badge.textContent = cfg.label;

    // Update symbol
    const sym = document.getElementById('opSymbol');
    sym.className = `op-symbol ${op}`;
    sym.textContent = cfg.symbol;

    // Update button
    const btn = document.getElementById('calcBtn');
    btn.className = `calc-btn ${op}`;

    // Reset result
    const rv = document.getElementById('resultValue');
    rv.className = `result-value ${op}`;
    rv.textContent = '—';
    document.getElementById('resultEquation').textContent = '';
  }

  function calculate() {
    const a = parseFloat(document.getElementById('numA').value);
    const b = parseFloat(document.getElementById('numB').value);
    const rv = document.getElementById('resultValue');
    const re = document.getElementById('resultEquation');
    const cfg = opConfig[currentOp];

    if (isNaN(a) || isNaN(b)) {
      rv.className = 'result-value error';
      rv.textContent = 'Enter numbers!';
      re.textContent = '';
      return;
    }

    let result;
    if (currentOp === 'add') result = a + b;
    else if (currentOp === 'sub') result = a - b;
    else if (currentOp === 'mul') result = a * b;
    else {
      if (b === 0) {
        rv.className = 'result-value error';
        rv.textContent = 'Can\'t ÷ by 0!';
        re.textContent = '';
        return;
      }
      result = a / b;
    }

    // Round nicely
    const displayed = parseFloat(result.toFixed(10)).toString();

    // Animate result
    rv.style.animation = 'none';
    rv.offsetHeight; // reflow
    rv.style.animation = '';
    rv.className = `result-value ${currentOp}`;
    rv.textContent = displayed;
    re.textContent = `${a} ${cfg.symbol} ${b} = ${displayed}`;

    // Confetti
    spawnConfetti();

    // Add to history
    addHistory(a, b, displayed, currentOp, cfg.symbol);
  }

  function addHistory(a, b, result, op, symbol) {
    history.unshift({ a, b, result, op, symbol });
    if (history.length > 12) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history">No calculations yet. Let\'s do some math! 🚀</div>';
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-item ${h.op}">
        <span class="eq">${h.a} ${h.symbol} ${h.b}</span>
        <span class="ans">= ${h.result}</span>
      </div>
    `).join('');
  }

  function clearHistory() {
    history.length = 0;
    renderHistory();
  }

  function spawnConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#FF8E53','#6C63FF','#2BCBBF'];
    for (let i = 0; i < 28; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      piece.style.animationDuration = (0.8 + Math.random() * 0.7) + 's';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 1800);
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
</script>
</body>
</html>
